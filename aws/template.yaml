AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  RAAS Builders — Full AWS stack
  CloudFront (CDN + SSL) → S3 (static) + API Gateway (Lambda)
  Single domain serves both website and API.

# ─── Parameters ───────────────────────────────────────────
Parameters:
  SessionSecret:
    Type: String
    NoEcho: true
    Description: Random string 32+ chars for signing session cookies
  AdminPassword:
    Type: String
    NoEcho: true
    Description: Admin panel password
  AdminUsername:
    Type: String
    Default: admin
    Description: Admin panel username
  NotifyEmail:
    Type: String
    Default: ''
    Description: Email for contact form notifications (optional)
  SesFromEmail:
    Type: String
    Default: ''
    Description: Verified SES sender email (optional)
  DomainName:
    Type: String
    Default: ''
    Description: >
      Custom domain (e.g. raasbuilders.com). Leave blank to use
      CloudFront's default *.cloudfront.net domain.
  AcmCertificateArn:
    Type: String
    Default: ''
    Description: >
      ACM certificate ARN for your custom domain (us-east-1 region required).
      Leave blank if no custom domain.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, '']]

Globals:
  Function:
    Timeout: 15
    Runtime: nodejs20.x
    MemorySize: 256
    Environment:
      Variables:
        SESSION_SECRET: !Ref SessionSecret
        ADMIN_PASSWORD: !Ref AdminPassword
        ADMIN_USERNAME: !Ref AdminUsername
        NOTIFY_EMAIL: !Ref NotifyEmail
        SES_FROM_EMAIL: !Ref SesFromEmail
        DYNAMODB_TABLE: !Ref RaasTable

Resources:

  # ═══════════════════════════════════════════════════════
  #   DynamoDB (key-value store)
  # ═══════════════════════════════════════════════════════
  RaasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: raas-kv
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  # ═══════════════════════════════════════════════════════
  #   Lambda + API Gateway
  # ═══════════════════════════════════════════════════════
  RaasApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: raas-api
      Handler: aws/lambda.handler
      CodeUri: ../
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RaasTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            Path: /api/{proxy+}
            Method: ANY
            ApiId: !Ref RaasHttpApi

  RaasHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-RAAS-Client
          - Cookie
        AllowCredentials: false

  # ═══════════════════════════════════════════════════════
  #   S3 Bucket (static files — private, accessed via CloudFront OAC)
  # ═══════════════════════════════════════════════════════
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'raas-website-${AWS::AccountId}'
      # NO WebsiteConfiguration — CloudFront handles routing
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # OAC — lets CloudFront read from private S3 bucket
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: raas-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket policy — only CloudFront can read
  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${StaticSiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ═══════════════════════════════════════════════════════
  #   CloudFront Distribution
  #   - Default: S3 (static files)
  #   - /api/*:  API Gateway (Lambda)
  #   - SSL, HTTP/2, gzip, edge caching
  # ═══════════════════════════════════════════════════════
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: RAAS Builders website
        DefaultRootObject: index.html
        PriceClass: PriceClass_200   # India, Asia, Europe, NA
        HttpVersion: http2and3

        # Custom domain + SSL (if provided)
        Aliases:
          !If
            - HasCustomDomain
            - - !Ref DomainName
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - HasCertificate
            - AcmCertificateArn: !Ref AcmCertificateArn
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true

        # ─── Origins ─────────────────────────────────
        Origins:
          # Origin 1: S3 (static files)
          - Id: S3Origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''

          # Origin 2: API Gateway (Lambda)
          - Id: ApiOrigin
            DomainName: !Sub '${RaasHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2

        # ─── Cache Behaviors ─────────────────────────
        # /api/* → Lambda (no caching, pass all headers)
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            Compress: true

        # Default → S3 (static files, cached)
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          # SPA fallback: serve index.html for client-side routes
          FunctionAssociations: []

        # ─── Custom Error Pages ──────────────────────
        CustomErrorResponses:
          # 403 from S3 (file not found) → serve 404.html
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60
          # Actual 404
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60

        # ─── Security Headers ────────────────────────
        # (matches vercel.json headers)
        # Using CloudFront response headers policy
        # Created inline below

  # Response headers policy (security headers matching vercel.json)
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: raas-security-headers
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: SAMEORIGIN
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
            Preload: true

# ═══════════════════════════════════════════════════════
#   Outputs
# ═══════════════════════════════════════════════════════
Outputs:
  CloudFrontUrl:
    Description: CloudFront URL (use this as your site URL)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  CloudFrontDistributionId:
    Description: CloudFront Distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
  ApiGatewayUrl:
    Description: API Gateway direct URL (for debugging, not public)
    Value: !Sub 'https://${RaasHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  StaticBucketName:
    Description: S3 bucket name (for aws s3 sync)
    Value: !Ref StaticSiteBucket
  DynamoTableName:
    Description: DynamoDB table
    Value: !Ref RaasTable
  CustomDomainNote:
    Condition: HasCustomDomain
    Description: >
      Point your domain's DNS to CloudFront. Create a CNAME or
      Route 53 alias record pointing to the CloudFront domain above.
    Value: !Sub 'Point ${DomainName} → ${CloudFrontDistribution.DomainName}'
