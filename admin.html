<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - RAAS</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-container">
  <!-- Login Form -->
  <div id="login-section" class="login-section">
    <div class="login-card">
      <div class="login-header">
        <h1>🔐 Admin Login</h1>
        <p>RAAS Builders & Developers</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="error-msg" id="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="dashboard-section" class="dashboard-section" style="display:none;">
    <div class="dashboard-header">
      <h1>Admin Dashboard</h1>
      <button id="logout-btn" class="btn-secondary">Logout</button>
    </div>

    <div class="dashboard-content">
      <!-- Add Property Form -->
      <div class="card">
        <h2>Add New Property</h2>
        <form id="property-form">
          <div class="form-row">
            <div class="form-group">
              <label>Property Name *</label>
              <input type="text" id="prop-name" required>
            </div>
            <div class="form-group">
              <label>Type *</label>
              <select id="prop-type" required>
                <option value="">Select Type</option>
                <option value="plot">Plot</option>
                <option value="apartment">Apartment</option>
                <option value="villa">Villa</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Location *</label>
              <input type="text" id="prop-location" required>
            </div>
            <div class="form-group">
              <label>Price (₹) *</label>
              <input type="text" id="prop-price" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Area (sq.ft)</label>
              <input type="text" id="prop-area">
            </div>
            <div class="form-group">
              <label>Status *</label>
              <select id="prop-status" required>
                <option value="available">Available</option>
                <option value="sold">Sold</option>
                <option value="premium">Premium</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Bedrooms / BHK</label>
              <input type="text" id="prop-bhk" placeholder="e.g. 2 BHK, 3 BHK">
            </div>
            <div class="form-group">
              <label>Facing</label>
              <select id="prop-facing">
                <option value="">Select Facing</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="North-East">North-East</option>
                <option value="North-West">North-West</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Amenities (comma separated)</label>
            <input type="text" id="prop-amenities" placeholder="e.g. Swimming Pool, Gym, 24/7 Security, Parking">
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="prop-description" rows="3" placeholder="Describe the property in detail..."></textarea>
          </div>

          <!-- Image Upload -->
          <div class="form-group">
            <label>Property Photos (upload multiple)</label>
            <div class="upload-box" id="image-upload-box" onclick="document.getElementById('prop-images').click()">
              <div class="upload-icon">📷</div>
              <p>Click to upload photos</p>
              <span>JPG, PNG, WEBP — unlimited photos</span>
              <input type="file" id="prop-images" accept="image/*" multiple style="display:none" onchange="handleImageUpload(this)">
            </div>
            <div id="image-previews" class="image-previews"></div>
          </div>

          <!-- Layout Upload -->
          <div class="form-group">
            <label>Floor Plan / Layout (PDF or Image)</label>
            <div class="upload-box" id="layout-upload-box" onclick="document.getElementById('prop-layout').click()">
              <div class="upload-icon">📐</div>
              <p>Click to upload floor plan / layout</p>
              <span>PDF, JPG, PNG accepted</span>
              <input type="file" id="prop-layout" accept=".pdf,image/*" style="display:none" onchange="handleLayoutUpload(this)">
            </div>
            <div id="layout-preview" class="layout-preview"></div>
          </div>

          <button type="submit" class="btn-primary">✅ Add Property</button>
        </form>
      </div>

      <!-- Properties List -->
      <div class="card">
        <h2>Manage Properties</h2>
        <div id="properties-list" class="properties-list">
          <!-- Properties will be loaded here -->
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
