<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - RAAS</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-container">
  <!-- Login Form -->
  <div id="login-section" class="login-section">
    <div class="login-card">
      <div class="login-header">
        <h1>🔐 Admin Login</h1>
        <p>RAAS Builders & Developers</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="error-msg" id="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="dashboard-section" class="dashboard-section" style="display:none;">
    <div class="dashboard-header">
      <h1>Admin Dashboard</h1>
      <button id="logout-btn" class="btn-secondary">Logout</button>
    </div>

    <div class="dashboard-content">
      <!-- Add Property Form -->
      <div class="card">
        <h2>Add New Property</h2>
        <form id="property-form">
          <div class="form-row">
            <div class="form-group">
              <label>Property Name *</label>
              <input type="text" id="prop-name" required>
            </div>
            <div class="form-group">
              <label>Type *</label>
              <select id="prop-type" required>
                <option value="">Select Type</option>
                <option value="plot">Plot</option>
                <option value="apartment">Apartment</option>
                <option value="villa">Villa</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Location *</label>
              <input type="text" id="prop-location" required>
            </div>
            <div class="form-group">
              <label>Price (₹) *</label>
              <input type="text" id="prop-price" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Area (sq.ft)</label>
              <input type="text" id="prop-area">
            </div>
            <div class="form-group">
              <label>Status *</label>
              <select id="prop-status" required>
                <option value="available">Available</option>
                <option value="sold">Sold</option>
                <option value="premium">Premium</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="prop-description" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="prop-image" placeholder="https://example.com/image.jpg">
          </div>

          <button type="submit" class="btn-primary">Add Property</button>
        </form>
      </div>

      <!-- Properties List -->
      <div class="card">
        <h2>Manage Properties</h2>
        <div id="properties-list" class="properties-list">
          <!-- Properties will be loaded here -->
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
